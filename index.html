<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuck UU - Authentication Gateway</title>
    <style>
        /* Importing futuristic fonts from Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Share+Tech+Mono&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050811;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Perspective grid background */
        body::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            /* Creates the subtle slanted, retro-futuristic horizon grid */
            transform: perspective(800px) rotateX(25deg) rotateY(-10deg) skewX(-5deg);
            z-index: 1;
        }

        /* Subtle ambient lighting at the top */
        .top-lighting {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(180deg, rgba(255, 184, 0, 0.03) 0%, transparent 100%);
            transform: skewY(-4deg);
            z-index: 2;
        }

        /* Main UI Container */
        .gateway-box {
            position: relative;
            z-index: 10;
            width: 560px;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        /* Tech Bracket Style (Top-Left) */
        .gateway-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            border-top: 2px solid #00f3ff;
            border-left: 2px solid #00f3ff;
            opacity: 0.8;
        }

        /* Tech Bracket Style (Top-Right) */
        .gateway-box::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 50px;
            border-top: 2px solid #00f3ff;
            border-right: 2px solid #00f3ff;
            opacity: 0.8;
        }

        /* Top Monospaced Tag */
        .header-tag {
            font-family: 'Share Tech Mono', monospace;
            color: #ffb800;
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 2px;
            word-spacing: 3px;
        }

        /* Text Wrap for Glitch Elements */
        .title-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Chromatic Aberration / Split RGB Glitch Effect */
        .glitch-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 0.95;
            color: #ffffff;
            position: relative;
            /* Left side Cyan offset, Right side Magenta offset */
            text-shadow: 
                -4px -1px 0px #00f3ff, 
                 4px  1px 0px #ff007f;
        }

        /* Sub-status text */
        .status-tag {
            font-family: 'Share Tech Mono', monospace;
            color: #00f3ff;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 4px rgba(0, 243, 255, 0.3);
        }

        /* Bottom Visualizer Graph */
        .data-visualizer {
            display: flex;
            align-items: flex-end;
            gap: 14px;
            height: 65px;
            margin-top: 10px;
        }

        .bar {
            width: 16px;
            border-radius: 1px;
        }

        /* Muted Cyan variant from the reference image */
        .bar.cyan {
            background-color: #008793;
        }

        /* Muted Magenta variant from the reference image */
        .bar.magenta {
            background-color: #8c1d6b;
        }

        /* Custom heights to replicate layout */
        .h-30 { height: 30%; }
        .h-55 { height: 55%; }
        .h-85 { height: 85%; }
        .h-20 { height: 20%; }
        .h-60 { height: 60%; }
        .h-90 { height: 90%; }
        .h-40 { height: 40%; }
        .h-50 { height: 50%; }
    </style>
</head>
<body>

    <div class="top-lighting"></div>

    <div class="gateway-box">
        
        <div class="header-tag">AUTHENTICATION GATEWAY / BUILD 2077</div>
        
        <div class="title-container">
            <h1 class="glitch-text">RTX ON</h1>
            <h1 class="glitch-text">LOGIN</h1>
        </div>

        <div class="status-tag">ENCRYPTED ACCESS STREAM ONLINE</div>

        <div class="data-visualizer">
            <div class="bar cyan h-30"></div>
            <div class="bar magenta h-55"></div>
            <div class="bar cyan h-85"></div>
            <div class="bar magenta h-20"></div>
            <div class="bar cyan h-60"></div>
            <div class="bar magenta h-90"></div>
            <div class="bar cyan h-40"></div>
            <div class="bar magenta h-50"></div>
            <div class="bar cyan h-85"></div>
        </div>

    </div>

</body>
</html>
